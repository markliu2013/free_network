    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
  Airport2:
    url: "https://sub3.smallstrawberry.com/api/v1/client/subscribe?token=17e73181f16cd30a053840fb5796fd92"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
  Airport3:
    url: "https://8.218.167.131:55356/api/v1/client/subscribe?token=1bedfdf09e11711c7bc63946fff0c8b5"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
